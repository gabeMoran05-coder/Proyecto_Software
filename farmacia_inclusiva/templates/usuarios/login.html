<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmacia Gi – Iniciar sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#0f4c81 0%,#1e7fc5 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { width: 380px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.25); }
    .login-card .card-header { background: #0f4c81; color:#fff; border-radius: 16px 16px 0 0; text-align:center; padding:1.5rem; }
  </style>
</head>
<body>
<div class="card login-card">
  <div class="card-header">
    <i class="bi bi-capsule-pill fs-1"></i>
    <h5 class="mb-0 mt-2">Farmacia Gi</h5>
    <small class="opacity-75">Sistema de inventario inclusivo</small>
  </div>
  <div class="card-body p-4">
    {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-danger">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        {{ form.username }}
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
