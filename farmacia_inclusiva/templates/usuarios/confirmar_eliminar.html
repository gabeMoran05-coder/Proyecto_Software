{% extends 'base.html' %}
{% block title %}Confirmar eliminación{% endblock %}
{% block page_title %}Confirmar eliminación{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Confirmar eliminación</div>
      <div class="card-body">
        <p>¿Estás seguro de eliminar <strong>{{ objeto }}</strong>? Esta acción no se puede deshacer.</p>
        <form method="post">{% csrf_token %}
          <button type="submit" class="btn btn-danger">Sí, eliminar</button>
          <a href="javascript:history.back()" class="btn btn-light ms-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
