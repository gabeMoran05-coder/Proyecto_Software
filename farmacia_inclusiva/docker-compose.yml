version: '3.9'

services:

  # ─── Base de datos PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: farmacia_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-farmacia}
      POSTGRES_USER: ${POSTGRES_USER:-farmacia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmacia_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgrest_role.sql:/docker-entrypoint-initdb.d/init_postgrest_role.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farmacia_user} -d ${POSTGRES_DB:-farmacia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farmacia_net

  # ─── Django (aplicación principal) ──────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmacia_web
    restart: on-failure
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_DB: ${POSTGRES_DB:-farmacia}
      POSTGRES_USER: ${POSTGRES_USER:-farmacia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmacia_pass}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-django-insecure-farmacia-dev-key-change-in-production}
      DEBUG: ${DEBUG:-True}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - farmacia_net

  # ─── PostgREST (API REST automática sobre PostgreSQL) ───────────────────────
  postgrest:
    image: postgrest/postgrest:v12.0.2
    container_name: farmacia_postgrest
    restart: always
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-farmacia_user}:${POSTGRES_PASSWORD:-farmacia_pass}@db:5432/${POSTGRES_DB:-farmacia}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: postgrest_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:-super-secret-jwt-key-change-in-production}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - farmacia_net

  # ─── Swagger UI (documentación de la API PostgREST) ─────────────────────────
  swagger:
    image: swaggerapi/swagger-ui
    container_name: farmacia_swagger
    restart: always
    environment:
      API_URL: http://localhost:3000/
    ports:
      - "8080:8080"
    depends_on:
      - postgrest
    networks:
      - farmacia_net

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  farmacia_net:
    driver: bridge
